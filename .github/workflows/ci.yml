name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pin clang-format-18 to match .pre-commit-config.yaml so local devs
      # and CI produce identical output. Plain `apt install clang-format`
      # pulls noble's default (22) which disagrees with us on brace-init.
      - name: Install clang-format-18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-18

      - name: Check clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc')
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format-18 --dry-run --Werror "${files[@]}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run ESLint
        working-directory: ui
        run: npm run lint

  # Build + run the test target only. We intentionally do NOT build the
  # plugin / standalone GUI targets here — they require JUCE's WebView,
  # which on Linux pulls libgtk-3 + libwebkit2gtk-4.1 + pkg-config and a
  # version-sensitive linker tree that has cost us 7 consecutive CI runs
  # of whack-a-mole. The dev machine is macOS where JUCE WebView works
  # natively via WKWebView; the user builds + runs the plugin locally on
  # every change. Cross-platform plugin CI is deferred until distribution
  # becomes a concern.
  #
  # The test target gates its 3 WebView-using files on
  # AGENTIC_SYNTH_BUILD_PLUGIN via generator expressions, so flipping
  # the flag drops WebUiComponent.cpp + agentic_synth_ui_assets +
  # juce::juce_gui_extra cleanly — no gtk, no webkit, no pkg-config.
  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          # Minimal JUCE headless build deps. No gtk/webkit/pkg-config —
          # those are only needed for the plugin's WebView path.
          sudo apt-get install -y -qq \
            libfreetype-dev \
            libcurl4-openssl-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libfontconfig-dev

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      # ccache cuts the JUCE rebuild cost across runs. Key on os + the
      # build-type so debug / release caches don't collide.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-tests-debug
          max-size: 500M

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTIC_SYNTH_BUILD_TESTS=ON \
            -DAGENTIC_SYNTH_BUILD_PLUGIN=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      # --parallel 2 caps concurrency under JUCE's heavy TUs to stay
      # inside the 16 GB ubuntu-latest free-tier RAM envelope.
      - name: Build test target
        run: cmake --build build --target agentic_synth_tests --config Debug --parallel 2

      - name: Run unit tests
        run: ctest --test-dir build --build-config Debug --output-on-failure
