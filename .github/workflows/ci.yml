name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pin clang-format-18 to match .pre-commit-config.yaml (which uses
      # clang-format 19 mirror but 18 is API-compatible with our style).
      # Plain `apt install clang-format` pulls whatever Ubuntu defaults to
      # (currently 22 on noble) and disagrees with local devs running 18/19.
      - name: Install clang-format-18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format-18

      - name: Check clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc')
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format-18 --dry-run --Werror "${files[@]}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run ESLint
        working-directory: ui
        run: npm run lint

  build-test:
    name: Build + Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libcurl4-openssl-dev \
            libfontconfig-dev \
            libgl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI (required for juce_add_binary_data)
        working-directory: ui
        run: |
          npm ci
          npx vite build

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTIC_SYNTH_BUILD_TESTS=ON \
            -DAGENTIC_SYNTH_BUILD_PLUGIN=ON

      - name: Build everything
        run: cmake --build build --config Debug --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Debug --output-on-failure
