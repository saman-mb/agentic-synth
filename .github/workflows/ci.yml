name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format

      - name: Check clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc')
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run ESLint
        working-directory: ui
        run: npm run lint

  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [[self-hosted, Linux, X64, unit-test], [self-hosted, macOS, ARM64]]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libcurl4-openssl-dev \
            libfontconfig-dev \
            libgl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            lcov

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install lcov

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Cache CMake and JUCE artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            ~/.cache
          key: ${{ runner.os }}-cmake-juce-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-juce-

      - name: Configure CMake (Linux — with gcov coverage)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTIC_SYNTH_BUILD_TESTS=ON \
            -DAGENTIC_SYNTH_BUILD_PLUGIN=OFF \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Configure CMake (macOS / Windows — without coverage)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cmake -S . -B build \
            -DAGENTIC_SYNTH_BUILD_PLUGIN=OFF \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTIC_SYNTH_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build --config Debug --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Debug --output-on-failure

      - name: Generate lcov coverage report (Linux only)
        if: runner.os == 'Linux'
        run: |
          lcov --capture --directory build \
               --output-file build/coverage.info \
               --ignore-errors mismatch
          lcov --remove build/coverage.info \
               '/usr/*' '*/Catch2/*' '*/third_party/*' '*/tests/*' \
               --output-file build/coverage_filtered.info \
               --ignore-errors unused
          lcov --list build/coverage_filtered.info

      - name: Upload coverage to Codecov (Linux only)
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage_filtered.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate HTML coverage report (Linux only)
        if: runner.os == 'Linux'
        run: |
          genhtml build/coverage_filtered.info \
                  --output-directory build/coverage_html

      - name: Archive HTML coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage_html

  sanitizer:
    name: Sanitizers (ASAN/UBSAN)
    runs-on: [self-hosted, Linux, X64, unit-test]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype-dev \
            libcurl4-openssl-dev \
            libfontconfig-dev \
            libgl-dev \
            libgtk-3-dev

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Configure CMake with ASAN/UBSAN
        run: |
          cmake -S . -B build_san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DAGENTIC_SYNTH_BUILD_TESTS=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=undefined" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build with sanitizers
        run: cmake --build build_san --config Debug --parallel

      - name: Run tests with sanitizers
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build_san --build-config Debug --output-on-failure
