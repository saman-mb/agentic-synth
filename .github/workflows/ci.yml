name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, Linux, X64, unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Check clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc')
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run ESLint
        working-directory: ui
        run: npm run lint

  build:
    name: Build (Linux)
    needs: lint
    runs-on: [self-hosted, Linux, X64, unit-test]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Cache CMake and JUCE artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            ~/.cache
          key: ${{ runner.os }}-cmake-juce-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-juce-

      - name: Set up pkg-config path for self-hosted runner
        run: |
          export PKG_CONFIG_PATH=/home/saman/local-sysroot/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DAGENTIC_SYNTH_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build --config Debug --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Debug --output-on-failure
