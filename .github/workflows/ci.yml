name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-format

      - name: Check clang-format
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.h' '*.hpp' '*.cxx' '*.cc')
          if [ "${#files[@]}" -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Run ESLint
        working-directory: ui
        run: npm run lint

  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: clang
            cxx: clang++
          - os: windows-latest
            cc: cl
            cxx: cl

    steps:
      - uses: actions/checkout@v4

      - name: Configure environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libasound2-dev \
            libjack-jackd2-dev \
            libfreetype6-dev \
            libcurl4-openssl-dev

      - name: Configure environment (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install automake pkg-config

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28.x"

      - name: Cache CMake and JUCE artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            ~/.cache
            ~/Library/Caches/CMake
            ~\AppData\Local\Temp
          key: ${{ runner.os }}-cmake-juce-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'src/**', 'tests/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-juce-

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DAGENTIC_SYNTH_BUILD_TESTS=ON

      - name: Build project
        run: cmake --build build --config Debug --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Debug --output-on-failure
